
<div id="root"></div>
<script>
// ===================== SCORING =====================
function qualPoints(place){const p=parseInt(place,10);if(!p||p<1)return 0;if(p===1)return 40;if(p===2)return 35;return Math.max(0,37-p);}
function diffPoints(diff){const d=Math.abs(parseInt(diff,10));const s=[10,7,5,3,1,0];if(isNaN(d))return 0;return d>=5?0:s[d];}
function mfgPoints(place){const p=parseInt(place,10);if(!p||p<1||p>10)return 0;return 11-p;}
const MFG_NAMES={Chv:'Chevrolet',Frd:'Ford',Tyt:'Toyota'};
const num=x=>x==null?'':String(x);

// ===================== STORAGE =====================
const STORE_KEY='nascar_pred_v3';
async function loadState(){try{const r=await window.storage.get(STORE_KEY);return r?JSON.parse(r.value):null;}catch(e){return null;}}
async function saveState(s){try{await window.storage.set(STORE_KEY,JSON.stringify(s));}catch(e){}}

const DEFAULT={
  raceName:'', feedRaw:'', resultsRaw:'', pointsRaw:'',
  year:'2026', series:'1', raceId:'',
  qualRoster:[], raceRoster:[], pointsByNum:{}, lastFeedType:'',
  cautionSegmentsRace:null, stageNumRace:null,
  cautionInfo:null, // {total, stageOnly, racing} computed
  dnfAuto:null,
  picks:[null,null,null,null],
  qualPlaces:['','','',''],
  racePlaces:['','','',''],
  raceDriverPts:['','','',''],
  predDNF:'', actualDNF:'',
  predCaution:'', actualCaution:'',
  mfgPick:'', mfgFinishAuto:''
};
let state=null;

// ===================== PARSERS =====================
function cleanName(s){return (s||'').replace(/^[*#\s]+/,'').replace(/\s*[#(].*$/,'').trim();}

// live_feed.json — works for BOTH qualifying (run_type 2) and race.
function parseFeed(raw){
  let j=JSON.parse(raw);
  // some feeds wrap payload; unwrap common containers
  if(j && !Array.isArray(j.vehicles)){
    if(j.feed&&Array.isArray(j.feed.vehicles)) j=j.feed;
    else if(j.data&&Array.isArray(j.data.vehicles)) j=j.data;
    else if(Array.isArray(j)&&j[0]&&Array.isArray(j[0].vehicles)) j=j[0];
  }
  const vehicles=Array.isArray(j.vehicles)?j.vehicles:[];
  const isQual=j.run_type===2||/qualifying|pole/i.test(j.run_name||'');
  const roster=vehicles.map(v=>({
    num:String(v.vehicle_number),
    name:cleanName(v.driver&&v.driver.full_name)||('#'+v.vehicle_number),
    mfg:v.vehicle_manufacturer,
    running:v.running_position,
    points:(v.points_earned_this_race!=null?v.points_earned_this_race:null),
    onTrack:(v.is_on_track===true),
    laps:v.laps_completed
  }));
  return {roster,feedType:isQual?'qual':'race',
    raceName:(j.run_name||'').replace(/\s*(Busch Pole|Qualifying|Pole).*$/i,'').trim()||j.track_name||'',
    raceId:(j.race_id!=null?String(j.race_id):''),
    series:(j.series_id!=null?String(j.series_id):''),
    cautionSegments:(typeof j.number_of_caution_segments==='number')?j.number_of_caution_segments:null,
    stageNum:(j.stage&&typeof j.stage.stage_num==='number')?j.stage.stage_num:null};
}

// live-points.json — points_earned_this_race per car number
function parsePoints(raw){
  const j=JSON.parse(raw);
  const arr=Array.isArray(j)?j:(j.vehicles||j.drivers||j.points||[]);
  const map={};
  (arr||[]).forEach(e=>{
    const cn=e.vehicle_number??e.car_number??e.number;
    const pts=e.points_earned_this_race;
    if(cn!=null && pts!=null && !isNaN(+pts)) map[String(cn)]=+pts;
  });
  return map;
}

// ===================== FEED URL BUILDER =====================
function feedLinks(year,series,raceId){
  const base=`https://cf.nascar.com/live/feeds/series_${series}/${raceId}`;
  return {
    schedule:`https://cf.nascar.com/cacher/${year}/${series}/race_list_basic.json`,
    live:`${base}/live_feed.json`,
    livePoints:`${base}/live-points.json`,
    livePage:`https://www.nascar.com/live-results/`
  };
}

// Try to auto-fetch a feed URL (works only if NASCAR CDN allows CORS).
async function fetchFeed(url){
  const res=await fetch(url,{cache:'no-store'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return await res.text();
}

// Apply a single live_feed.json (routes by run_type into qual/race roster)
function applyFeed(raw){
  const p=parseFeed(raw);
  if(!state.raceName&&p.raceName)state.raceName=p.raceName;
  if(p.raceId)state.raceId=p.raceId; if(p.series)state.series=p.series;
  if(p.feedType==='qual'){ state.qualRoster=p.roster; }
  else { state.raceRoster=p.roster; state.cautionSegmentsRace=p.cautionSegments; state.stageNumRace=p.stageNum; }
  return p.feedType;
}

function recompute(){
  const qByNum={}; state.qualRoster.forEach(d=>qByNum[d.num]=d);
  const rByNum={}; state.raceRoster.forEach(d=>rByNum[d.num]=d);

  state.picks.forEach((nm,i)=>{
    // QUALIFYING place — only from qual feed
    const q=nm?qByNum[nm]:null;
    state.qualPlaces[i]= q?num(q.running):'';
    // RACE place — from race feed
    const r=nm?rByNum[nm]:null;
    state.racePlaces[i]= r?num(r.running):'';
    // RACE points — from live-points feed (points_earned_this_race)
    if(nm && state.pointsByNum && state.pointsByNum[nm]!=null) state.raceDriverPts[i]=state.pointsByNum[nm];
  });

  // manufacturer best finish — from race feed
  if(state.mfgPick && state.raceRoster.length){
    let best=null;
    state.raceRoster.forEach(d=>{ if(d.mfg===state.mfgPick && d.running>0){ if(best===null||d.running<best) best=d.running; }});
    state.mfgFinishAuto = best!=null?best:'';
  }

  // cautions (зачёт) = number_of_caution_segments − stage_num + 1
  if(state.cautionSegmentsRace!=null && state.stageNumRace!=null){
    const racing = state.cautionSegmentsRace - state.stageNumRace + 1;
    state.cautionInfo = {total:state.cautionSegmentsRace, stageOut:(state.stageNumRace-1), racing:racing};
    if(state.actualCaution==='') state.actualCaution = racing;
  }

  // DNF = number of cars with is_on_track === false (race feed)
  if(state.raceRoster.length){
    let dnf=0; state.raceRoster.forEach(d=>{ if(d.onTrack===false) dnf++; });
    state.dnfAuto=dnf;
    if(state.actualDNF==='') state.actualDNF=dnf;
  }
}

// ===================== UI =====================
function el(t,a={},...k){const e=document.createElement(t);for(const x in a){if(x==='class')e.className=a[x];else if(x==='html')e.innerHTML=a[x];else if(x.startsWith('on'))e.addEventListener(x.slice(2).toLowerCase(),a[x]);else if(a[x]!=null)e.setAttribute(x,a[x]);}k.flat().forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});return e;}
function combinedRoster(){const m={};state.raceRoster.forEach(d=>m[d.num]=d);state.qualRoster.forEach(d=>{if(!m[d.num])m[d.num]=d;});return Object.values(m);}
function driverOptions(sel){const o=[el('option',{value:''},'— выберите пилота —')];combinedRoster().slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(d=>{o.push(el('option',{value:d.num,...(String(sel)===d.num?{selected:'selected'}:{})},`#${d.num} ${d.name}`));});return o;}

function render(){
  recompute();
  const root=document.getElementById('root');root.innerHTML='';
  let qualTotal=0;state.qualPlaces.forEach(p=>qualTotal+=qualPoints(p));
  let raceDriverTotal=0;state.raceDriverPts.forEach(p=>raceDriverTotal+=(parseFloat(p)||0));
  const dnfPts=diffPoints((state.predDNF===''||state.actualDNF==='')?NaN:(state.predDNF-state.actualDNF));
  const cauPts=diffPoints((state.predCaution===''||state.actualCaution==='')?NaN:(state.predCaution-state.actualCaution));
  const mfgFin=state.mfgFinishAuto!==''?state.mfgFinishAuto:'';
  const mfgPts=mfgPoints(mfgFin);
  const raceTotal=raceDriverTotal+dnfPts+cauPts+mfgPts;
  const grand=qualTotal+raceTotal;

  root.appendChild(el('div',{class:'hd'},el('div',{class:'flag'}),
    el('div',{class:'htxt'},el('h1',{},'NASCAR · Калькулятор прогноза'),
      el('input',{class:'race',placeholder:'Название гонки',value:state.raceName,oninput:e=>{state.raceName=e.target.value;saveState(state);}})),
    el('div',{class:'grand'},el('span',{class:'glabel'},'ИТОГО'),el('span',{class:'gval'},String(grand)))));

  // ---- SOURCES / LINKS ----
  const L=feedLinks(state.year,state.series,state.raceId||'{race_id}');
  const src=el('section',{class:'card'});
  src.appendChild(el('div',{class:'sechd'},el('span',{},'Источники данных'),
    el('span',{class:'badge'+(state.raceId?' ok':'')}, state.raceId?('race_id: '+state.raceId):'race_id не задан')));
  const params=el('div',{class:'params'});
  params.appendChild(el('div',{class:'pgrp'},el('label',{},'Год'),
    el('input',{class:'pin',value:state.year,oninput:e=>{state.year=e.target.value.trim();},onchange:e=>{state.year=e.target.value.trim();saveState(state);render();}})));
  params.appendChild(el('div',{class:'pgrp'},el('label',{},'Серия'),
    el('select',{class:'pin',onchange:e=>{state.series=e.target.value;saveState(state);render();}},
      el('option',{value:'1',...(state.series==='1'?{selected:'selected'}:{})},'1 · Cup'),
      el('option',{value:'2',...(state.series==='2'?{selected:'selected'}:{})},'2 · Xfinity'),
      el('option',{value:'3',...(state.series==='3'?{selected:'selected'}:{})},'3 · Trucks'))));
  params.appendChild(el('div',{class:'pgrp'},el('label',{},'race_id'),
    el('input',{class:'pin',placeholder:'напр. 5614',value:state.raceId,oninput:e=>{state.raceId=e.target.value.trim();},onchange:e=>{state.raceId=e.target.value.trim();saveState(state);render();}})));
  src.appendChild(params);

  function linkRow(label,url,note,ready){
    const a=el('a',{class:'lnk'+(ready?'':' dim2'),href:url,target:'_blank',rel:'noopener'},url);
    return el('div',{class:'lrow'},
      el('div',{class:'lhd'},el('span',{class:'lname'},label), note?el('span',{class:'lnote'},note):null,
        el('button',{class:'copy',onclick:()=>{navigator.clipboard&&navigator.clipboard.writeText(url);}},'копировать')),
      a);
  }
  const ready=!!state.raceId;
  src.appendChild(linkRow('① Расписание (найти race_id)',L.schedule,'найди гонку → race_id',true));
  src.appendChild(linkRow('② live_feed.json (квалификация И гонка)',L.live,'места, жёлтые, сходы',ready));
  src.appendChild(linkRow('③ live-points.json (очки)',L.livePoints,'points_earned_this_race',ready));
  src.appendChild(linkRow('④ Страница live-results (запасной)',L.livePage,'если фид недоступен',true));
  const loadBtn=el('button',{class:'parse',disabled:ready?null:'disabled',onclick:async(ev)=>{
    const btn=ev.target; const old=btn.textContent; btn.textContent='Загрузка…'; btn.disabled=true;
    let report=[];
    try{
      const t=await fetchFeed(L.live);
      const ft=applyFeed(t);
      state.feedRaw=t;
      const n=(ft==='qual'?state.qualRoster:state.raceRoster).length;
      report.push(`live_feed: OK → определён как «${ft==='qual'?'КВАЛИФИКАЦИЯ':'ГОНКА'}», пилотов: ${n}`);
    }catch(e){ report.push('live_feed: ОШИБКА — '+e.message); }
    try{
      const t=await fetchFeed(L.livePoints);
      state.pointsRaw=t; state.pointsByNum=parsePoints(t);
      report.push(`live-points: OK → пилотов с очками: ${Object.keys(state.pointsByNum).length}`);
    }catch(e){ report.push('live-points: ОШИБКА — '+e.message); }
    state.actualCaution='';state.actualDNF='';
    saveState(state);
    btn.textContent=old; btn.disabled=false;
    render();
    alert('Результат автозагрузки:\n\n'+report.join('\n')+'\n\nЕсли live_feed определился как КВАЛИФИКАЦИЯ, а вам нужна ГОНКА — значит по этому URL сейчас лежит квалификационный заезд. Дождитесь публикации гоночного фида или вставьте его вручную.');
  }},'⤓ Загрузить автоматически');
  src.appendChild(el('div',{class:'btnrow'},loadBtn,el('span',{class:'lnote'},ready?'попытка fetch по ссылкам (может блокироваться CORS)':'сначала задайте race_id')));
  src.appendChild(el('div',{class:'sub'},'Автозагрузка работает, только если NASCAR отдаёт фиды с разрешённым CORS. Если не сработает — откройте ссылки и вставьте JSON вручную в поля ниже.'));
  root.appendChild(src);

  // JSON inputs
  const qualLoaded=state.qualRoster.length>0, raceLoaded=state.raceRoster.length>0, ptsLoaded=Object.keys(state.pointsByNum||{}).length>0;
  const io=el('section',{class:'card'});
  io.appendChild(el('div',{class:'sechd'},el('span',{},'Ручная вставка JSON'),
    el('span',{class:'badge'+((qualLoaded||raceLoaded)?' ok':'')},
      `квал ${qualLoaded?'✓':'—'} · гонка ${raceLoaded?'✓':'—'} · очки ${ptsLoaded?'✓':'—'}`)));
  // auto-parse on blur/paste: update silently on input, parse on change
  io.appendChild(el('label',{class:'flbl'},'1 · live_feed.json — КВАЛИФИКАЦИЯ или ГОНКА (определится сам)'));
  io.appendChild(el('textarea',{class:'ta',placeholder:'Вставьте live_feed.json — данные разберутся автоматически',
    oninput:e=>{state.feedRaw=e.target.value;},
    onchange:e=>{state.feedRaw=e.target.value; if(state.feedRaw.trim()){try{applyFeed(state.feedRaw);state.actualCaution='';state.actualDNF='';saveState(state);render();}catch(err){alert('Ошибка разбора фида: '+err.message);}}}},state.feedRaw));
  io.appendChild(el('label',{class:'flbl'},'2 · live-points.json — ОЧКИ (points_earned_this_race)'));
  io.appendChild(el('textarea',{class:'ta',placeholder:'Вставьте live-points.json — очки разберутся автоматически',
    oninput:e=>{state.pointsRaw=e.target.value;},
    onchange:e=>{state.pointsRaw=e.target.value; if(state.pointsRaw.trim()){try{state.pointsByNum=parsePoints(state.pointsRaw);saveState(state);render();}catch(err){alert('Ошибка разбора очков: '+err.message);}}}},state.pointsRaw));
  io.appendChild(el('div',{class:'sub'},'Данные разбираются сразу при вставке (по клику вне поля). Для гонки нужно загрузить и live_feed.json (места/жёлтые/сходы), и live-points.json (очки).'));
  root.appendChild(io);

  // auto-detected summary chips
  if(state.cautionInfo||state.dnfAuto!=null){
    const chips=el('div',{class:'chips'});
    if(state.cautionInfo) chips.appendChild(el('span',{class:'chip'},`Жёлтые: сегментов ${state.cautionInfo.total} − стейдж ${state.cautionInfo.stageOut} = зачёт ${state.cautionInfo.racing}`));
    if(state.dnfAuto!=null) chips.appendChild(el('span',{class:'chip'},`Сходов (is_on_track=false): ${state.dnfAuto}`));
    root.appendChild(chips);
  }

  if(!combinedRoster().length) root.appendChild(el('div',{class:'hint'},'Вставьте фид и нажмите «Разобрать», чтобы выбрать пилотов из выпадающих списков.'));

  // picks + qual
  const pSec=el('section',{class:'card'});
  pSec.appendChild(el('div',{class:'sechd'},el('span',{},'Пилоты и квалификация'),el('span',{class:'sectot'},qualTotal+' очк.')));
  const pTbl=el('div',{class:'tbl'});
  pTbl.appendChild(el('div',{class:'thead'},el('div',{},'Пилот'),el('div',{class:'num'},'Место (квал)'),el('div',{class:'num'},'Очки')));
  for(let i=0;i<4;i++){const qp=state.qualPlaces[i];
    pTbl.appendChild(el('div',{class:'trow'},
      el('select',{class:'dsel',disabled:combinedRoster().length?null:'disabled',onchange:e=>{state.picks[i]=e.target.value||null;saveState(state);render();}},driverOptions(state.picks[i])),
      el('input',{class:'num',type:'number',min:'1',placeholder:'—',value:qp,oninput:e=>{state.qualPlaces[i]=e.target.value;saveState(state);},onchange:e=>{state.qualPlaces[i]=e.target.value;saveState(state);render();}}),
      el('div',{class:'num pts'},String(qualPoints(qp)))));}
  pSec.appendChild(pTbl);
  pSec.appendChild(el('div',{class:'sub'},'Место подставляется из фида квалификации; можно поправить вручную.'));
  root.appendChild(pSec);

  // race driver points
  const byNum={};combinedRoster().forEach(d=>byNum[d.num]=d);
  const rSec=el('section',{class:'card'});
  rSec.appendChild(el('div',{class:'sechd'},el('span',{},'Гонка · очки пилотов'),el('span',{class:'sectot'},raceDriverTotal+' очк.')));
  const rTbl=el('div',{class:'tbl'});
  rTbl.appendChild(el('div',{class:'thead2'},el('div',{},'Пилот'),el('div',{class:'num'},'Место'),el('div',{class:'num'},'Очки (вкл. стейджи)')));
  for(let i=0;i<4;i++){const d=state.picks[i]?byNum[state.picks[i]]:null;
    rTbl.appendChild(el('div',{class:'trow2'},
      el('div',{class:'dname'},d?`#${d.num} ${d.name}`:'Пилот '+(i+1)),
      el('div',{class:'num dim'},state.racePlaces[i]?String(state.racePlaces[i]):'—'),
      el('input',{class:'num',type:'number',step:'any',placeholder:'0',value:state.raceDriverPts[i],oninput:e=>{state.raceDriverPts[i]=e.target.value;saveState(state);},onchange:e=>{state.raceDriverPts[i]=e.target.value;saveState(state);render();}})));}
  rSec.appendChild(rTbl);
  rSec.appendChild(el('div',{class:'sub'},'Очки берутся из поля points_earned_this_race гоночного фида (уже включает стейджи). Без фида — введите вручную.'));
  root.appendChild(rSec);

  // bonuses
  const dSec=el('section',{class:'card'});
  dSec.appendChild(el('div',{class:'sechd'},el('span',{},'Гонка · бонусы'),el('span',{class:'sectot'},(dnfPts+cauPts+mfgPts)+' очк.')));
  function diffRow(label,pk,ak,pts,hint){const pred=state[pk],act=state[ak];const diff=(pred===''||act==='')?'—':Math.abs(pred-act);
    return el('div',{class:'drow'},el('div',{class:'dlbl'},label,hint?el('span',{class:'dhint'},hint):null),
      el('div',{class:'dgrp'},el('label',{},'Прогноз'),el('input',{class:'num',type:'number',min:'0',placeholder:'—',value:pred,oninput:e=>{state[pk]=e.target.value;saveState(state);},onchange:e=>{state[pk]=e.target.value;saveState(state);render();}})),
      el('div',{class:'dgrp'},el('label',{},'Факт'),el('input',{class:'num',type:'number',min:'0',placeholder:'—',value:act,oninput:e=>{state[ak]=e.target.value;saveState(state);},onchange:e=>{state[ak]=e.target.value;saveState(state);render();}})),
      el('div',{class:'dgrp'},el('label',{},'Δ'),el('div',{class:'diffval'},String(diff))),
      el('div',{class:'dgrp'},el('label',{},'Очки'),el('div',{class:'num pts'},String(pts))));}
  dSec.appendChild(diffRow('Сходы (DNF)','predDNF','actualDNF',dnfPts,state.dnfAuto!=null?`авто: ${state.dnfAuto}`:''));
  dSec.appendChild(diffRow('Жёлтые флаги','predCaution','actualCaution',cauPts,state.cautionInfo?`авто (зачёт): ${state.cautionInfo.racing}`:''));
  dSec.appendChild(el('div',{class:'drow'},el('div',{class:'dlbl'},'Производитель'),
    el('div',{class:'dgrp wide'},el('label',{},'Марка'),el('select',{class:'msel',onchange:e=>{state.mfgPick=e.target.value;saveState(state);render();}},
      el('option',{value:''},'— выберите —'),...['Chv','Frd','Tyt'].map(m=>el('option',{value:m,...(state.mfgPick===m?{selected:'selected'}:{})},MFG_NAMES[m])))),
    el('div',{class:'dgrp'},el('label',{},'Лучшее место'),el('div',{class:'diffval'},mfgFin!==''?String(mfgFin):'—')),
    el('div',{class:'dgrp'},el('label',{},'Очки'),el('div',{class:'num pts'},String(mfgPts)))));
  dSec.appendChild(el('div',{class:'sub'},'Авто из гоночного фида: жёлтые = number_of_caution_segments − stage_num + 1; сходы = число машин с is_on_track=false. Числа можно поправить вручную.'));
  root.appendChild(dSec);

  // summary
  const sum=el('section',{class:'card summary'});
  [['Квалификация',qualTotal],['Гонка · пилоты',raceDriverTotal],['Сходы',dnfPts],['Жёлтые',cauPts],['Производитель',mfgPts]].forEach(r=>{
    sum.appendChild(el('div',{class:'sumrow'},el('span',{},r[0]),el('span',{class:'pts'},String(r[1]))));});
  sum.appendChild(el('div',{class:'sumrow grandrow'},el('span',{},'ИТОГО'),el('span',{class:'pts'},String(grand))));
  root.appendChild(sum);

  root.appendChild(el('button',{class:'reset',onclick:async()=>{if(confirm('Очистить все данные?')){state=JSON.parse(JSON.stringify(DEFAULT));await saveState(state);render();}}},'Очистить всё'));
}

(async function(){const l=await loadState();state=l||JSON.parse(JSON.stringify(DEFAULT));for(const k in DEFAULT){if(!(k in state))state[k]=DEFAULT[k];}render();})();
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#16181d;--card:#1e2128;--line:#2c303a;--yellow:#ffd200;--dim:#8b909c;--pts:#5fe39a;--field:#0f1115;}
  #root{font-family:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;max-width:780px;margin:0 auto;color:#e8e8ea;background:var(--bg);padding:18px;border-radius:14px;}
  .hd{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
